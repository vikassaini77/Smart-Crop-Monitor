version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pest_api
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./best.pt:/app/best.pt
      - ./static:/app/static
      - ./uploads:/app/uploads
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/pestdb
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - GEMINI_API_KEY=AIzaSyBzx6ZOOX_N-Hvdp4twRtu1OfmES8-VOKg
    depends_on:
      - db
      - redis
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pest_worker
    volumes:
      - ./backend:/app/backend
      - ./best.pt:/app/best.pt
      - ./static:/app/static
      - ./uploads:/app/uploads
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/pestdb
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - GEMINI_API_KEY=AIzaSyBzx6ZOOX_N-Hvdp4twRtu1OfmES8-VOKg
    depends_on:
      - db
      - redis
    command: celery -A backend.celery_app.celery_app worker --loglevel=info --pool=solo

  db:
    image: postgres:15
    container_name: pest_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pestdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: pest_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
